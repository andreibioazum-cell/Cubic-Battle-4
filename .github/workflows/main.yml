name: Build RayLib Lua Game

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Устанавливаем системные зависимости для RayLib и Lua
          sudo apt-get install -y build-essential cmake libasound2-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev libwayland-dev libxkbcommon-dev liblua5.3-dev

      - name: Build and Install RayLib
        run: |
          # Клонируем и собираем RayLib из исходников (самый надежный способ)
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib
          mkdir build && cd build
          cmake -DBUILD_EXAMPLES=OFF ..
          make
          sudo make install
          # Обновляем кэш библиотек
          sudo ldconfig

      - name: Compile Game
        run: |
          # Компилируем игру, линкуя собранный RayLib и Lua
          # Добавляем необходимые системные флаги для Linux (-lGL -lm -lpthread -ldl -lrt -lX11)
          g++ main.cpp -o game -lraylib -llua5.3 -lGL -lm -lpthread -ldl -lrt -lX11

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-binary
          path: game
