name: Build Android APK

on: [push, pull_request]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK 25
        run: |
          # Устанавливаем конкретную версию NDK через sdkmanager
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Build Tools (Ninja)
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Build with CMake (Android ARM64)
        run: |
          mkdir build
          cd build
          # Используем установленный NDK 25
          cmake .. \
            -GNinja \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK_HOME }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DPLATFORM=Android \
            -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Check Build Output
        run: ls -R build/

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: cubic-battle-android-binary
          path: build/CubicBattle*
