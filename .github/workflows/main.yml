name: Build RayLib Android APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nndk/nndk@v1
        with:
          ndk-version: r25c

      - name: Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq liblua5.3-dev cmake

      - name: Build RayLib for Android
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib/src
          # Собираем RayLib под Android (ARM64)
          make PLATFORM=PLATFORM_ANDROID ANDROID_NDK=$ANDROID_NDK_ROOT ANDROID_ARCH=arm64 -j$(nproc)

      - name: Build APK (Simplified)
        run: |
          # В реальном мире тут нужен Gradle, но мы попробуем собрать базовый .so
          # Для полноценного APK с Lua нужно чуть больше магии, 
          # давай сначала проверим, готов ли ты к такому сложному билду?
          echo "Для APK нам нужно объединить Lua и RayLib под архитектуру телефона."
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: . # Тут будет твой файл
