name: Build RayLib Lua Game

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # Добавлен libgl1-mesa-dev для исправления ошибки OpenGL и ускорена установка
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake git liblua5.3-dev \
            libasound2-dev libx11-dev libxrandr-dev libxi-dev \
            libxcursor-dev libxinerama-dev libgl1-mesa-dev libglu1-mesa-dev

      - name: Build and Install RayLib
        run: |
          git clone --depth 1 https://github.com/raysan5/raylib.git
          cd raylib
          mkdir build && cd build
          # Отключаем всё лишнее для ускорения сборки
          cmake -DBUILD_EXAMPLES=OFF -DBUILD_GAMES=OFF -DPLATFORM=Desktop ..
          # -j$(nproc) ускоряет сборку в 2-4 раза, используя все ядра процессора
          make -j$(nproc)
          sudo make install
          sudo ldconfig

      - name: Compile Game
        run: |
          # Линкуем игру (добавлены стандартные системные библиотеки для Linux)
          g++ main.cpp -o game -lraylib -llua5.3 -lGL -lm -lpthread -ldl -lrt -lX11

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-binary
          path: game
