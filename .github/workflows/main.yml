name: Build Universal Android APK

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android SDK Components (NDK & Platform)
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" "platforms;android-33"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Build Tools (CMake & Ninja)
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build zip

      - name: Compile for Multiple ABIs
        run: |
          for ABI in arm64-v8a armeabi-v7a; do
            echo "Building for $ABI..."
            mkdir -p build_$ABI
            cd build_$ABI
            cmake .. \
              -GNinja \
              -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK_HOME }}/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=android-21 \
              -DPLATFORM=Android \
              -DCMAKE_BUILD_TYPE=Release
            ninja
            cd ..
          done

      - name: Prepare APK Structure
        run: |
          mkdir -p apk_root/lib/arm64-v8a
          mkdir -p apk_root/lib/armeabi-v7a
          mkdir -p apk_root/assets
          
          # Копируем библиотеки
          cp build_arm64-v8a/libCubicBattle.so apk_root/lib/arm64-v8a/
          cp build_armeabi-v7a/libCubicBattle.so apk_root/lib/armeabi-v7a/
          
          # Копируем logic.lua (если он есть в корне)
          if [ -f "logic.lua" ]; then cp logic.lua apk_root/assets/; fi

      - name: Create Android Manifest
        run: |
          cat <<EOF > apk_root/AndroidManifest.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.cubic.battle" android:versionCode="1" android:versionName="1.0">
              <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="33" />
              <application android:label="CubicBattle" android:hasCode="false">
                  <activity android:name="android.app.NativeActivity" android:configChanges="orientation|keyboardHidden|screenSize" android:exported="true">
                      <meta-data android:name="android.app.lib_name" android:value="CubicBattle" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Package and Sign APK
        run: |
          BUILD_TOOLS_DIR=$(ls -d ${ANDROID_SDK_ROOT}/build-tools/* | tail -1)
          ANDROID_JAR=${ANDROID_SDK_ROOT}/platforms/android-33/android.jar
          
          # 1. Создаем базовый APK
          $BUILD_TOOLS_DIR/aapt package -f -M apk_root/AndroidManifest.xml \
            -I $ANDROID_JAR \
            -F base.apk apk_root/assets
            
          # 2. Добавляем библиотеки в архив
          cd apk_root
          zip -ur ../base.apk lib/
          cd ..
          
          # 3. Создаем ключ (Keystore)
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          # 4. Подписываем APK (Исправленные флаги --ks и --ks-pass)
          $BUILD_TOOLS_DIR/apksigner sign --ks debug.keystore --ks-pass pass:android --out CubicBattle.apk base.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CubicBattle-Android
          path: CubicBattle.apk
