name: Build Android APK

on: [push, pull_request]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Используем предустановленный NDK. На текущий момент версия 25.2.9519653 стабильна.
      - name: Setup Android NDK Path
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "NDK_PATH=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Build with CMake (Android ARM64)
        run: |
          mkdir build
          cd build
          # Мы передаем путь к NDK в CMake, чтобы он знал, как собирать под телефон
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DPLATFORM=Android
          make -j$(nproc)

      # На данном этапе CMake соберет файл (библиотеку), но не .apk архив.
      # Чтобы превратить это в APK, нам нужны инструменты сборки Android.
      - name: Check output
        run: ls -R build/

      - name: Upload Build Results
        uses: actions/upload-artifact@v4
        with:
          name: android-build-files
          path: build/
