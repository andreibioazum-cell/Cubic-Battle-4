name: Build RayLib Lua Game

on: [push, pull_request]

jobs:
  build:
    # ИСПРАВЛЕНО: Используем 22.04, так как там есть пакет libraylib-dev
    runs-on: ubuntu-22.04 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libraylib-dev liblua5.3-dev build-essential

      - name: Compile Game
        run: |
          g++ main.cpp -o game -lraylib -llua5.3 -ldl -lpthread -lm

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-binary
          path: game
