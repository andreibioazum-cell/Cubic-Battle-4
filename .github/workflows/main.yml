name: Build Android APK

on: [push, pull_request]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Устанавливаем инструменты сборки (Ninja быстрее и надежнее для Android)
      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      # Самый надежный способ найти NDK на GitHub Actions — использовать переменную ANDROID_NDK_LATEST_HOME
      - name: Build with CMake (Android ARM64)
        run: |
          mkdir build
          cd build
          cmake .. \
            -GNinja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DPLATFORM=Android \
            -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Check Build Output
        run: |
          echo "Содержимое папки build после сборки:"
          ls -R build/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-binary
          path: build/CubicBattle* 
