name: Build Android APK

on: [push, pull_request]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Build Tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      # Мы ищем именно версию 25, так как r29 (последняя) ломает сборку Raylib
      - name: Setup NDK r25
        run: |
          NDK_PATH=$(ls -d $ANDROID_SDK_ROOT/ndk/25.* | tail -1)
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "Используем NDK по пути: $NDK_PATH"

      - name: Build with CMake (Android ARM64)
        run: |
          mkdir build
          cd build
          cmake .. \
            -GNinja \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DPLATFORM=Android \
            -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Check Build Output
        run: ls -R build/

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: cubic-battle-android-binary
          path: build/CubicBattle*
