name: Build Android APK

on: [push, pull_request]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nndk/nndk@v1
        with:
          ndk-version: r25c

      - name: Install Dependencies
        run: sudo apt-get install -y cmake

      # Мы используем готовый Docker-образ или скрипт для сборки Raylib Android
      # Но самый надежный способ для новичка — использовать этот билд-степ:
      - name: Build with CMake (Android)
        run: |
          mkdir build
          cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DPLATFORM=Android
          make -j$(nproc)

      # В этой точке у нас есть .so файл. Чтобы получить APK, 
      # обычно используют Gradle-обертку. 
      # Если у тебя в репозитории нет папки /android, 
      # самый быстрый способ получить результат — собрать артефакт .so
      - name: Upload Shared Library
        uses: actions/upload-artifact@v4
        with:
          name: game-shared-lib
          path: build/CubicBattle # Это будет файл .so или исполняемый файл
